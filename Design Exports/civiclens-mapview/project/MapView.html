<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CivicLens — MapView styling</title>
<meta name="viewport" content="width=1200" />
<link rel="stylesheet" href="map-styles.css" />
<style>
  /* Tiny annotation styles (junior-designer note inside the canvas) */
  .mv-intro {
    background: white;
    border: 1px solid var(--cl-border);
    border-radius: 12px;
    padding: 18px 22px;
    max-width: 980px;
    font-family: var(--cl-font-sans);
  }
  .mv-intro h2 {
    font-family: var(--cl-font-display);
    font-size: 1.5rem; font-weight: 700;
    margin: 0 0 6px 0;
    letter-spacing: -0.01em;
  }
  .mv-intro p {
    font-size: var(--cl-text-sm);
    color: var(--cl-text-light);
    line-height: 1.55;
    margin: 4px 0;
  }
  .mv-intro__chip {
    display: inline-flex; align-items: center;
    padding: 2px 8px;
    background: var(--cl-accent-soft);
    color: var(--cl-accent);
    border-radius: 999px;
    font-size: 0.66rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
    margin-right: 8px;
  }
  .mv-canvas-frame {
    border: 1px solid var(--cl-border);
    border-radius: 12px;
    overflow: hidden;
    background: white;
  }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- D3 + topojson + delaunay -->
<script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script src="https://unpkg.com/d3-delaunay@6.0.4/dist/d3-delaunay.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="map-shared.jsx"></script>
<script type="text/babel" src="map-chrome.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="intro"
        title="MapView styling"
        subtitle="Visual pass over the existing D3 interactivity — colors, strokes, chrome, popovers, markers, and load/error states."
      >
        <DCArtboard id="brief" label="Brief" width={980} height={220}>
          <div className="mv-intro" style={{ height: '100%', boxSizing: 'border-box' }}>
            <h2>Five screens, one visual system</h2>
            <p>
              <span className="mv-intro__chip">Tokens</span>
              Surfaces lean on <code>--cl-bg</code> + <code>--cl-card</code>. Accent green
              (<code>--cl-accent</code>, #2d6a4f) does all the heavy lifting for selection, focus,
              and CTA chrome. Party fills only appear behind the explicit "Show party makeup"
              toggle, at 25% opacity, so the chrome stays civic-neutral by default.
            </p>
            <p>
              <span className="mv-intro__chip">Density</span>
              Hairline strokes everywhere — 0.75px at rest, 1.5px on hover, 2px on selected.
              District labels are <code>.cl-num</code> tabular only when the cell can fit them.
              Floating chrome (legend pill, back pill, zoom dock, popovers) stays inside 16px from
              the canvas edges and shares the level-2 elevation token.
            </p>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="screens" title="Screens" subtitle="Drag to reorder · click ⤢ on any artboard to focus.">
        <DCArtboard id="screen-1" label="01 · National view" width={1000} height={680}>
          <div className="mv-canvas-frame" style={{ width: '100%', height: '100%' }}>
            <ScreenNational />
          </div>
        </DCArtboard>

        <DCArtboard id="screen-2" label="02 · State focused (Florida)" width={1000} height={680}>
          <div className="mv-canvas-frame" style={{ width: '100%', height: '100%' }}>
            <ScreenStateFocused />
          </div>
        </DCArtboard>

        <DCArtboard id="screen-3" label="03 · District focused (FL-19)" width={1000} height={680}>
          <div className="mv-canvas-frame" style={{ width: '100%', height: '100%' }}>
            <ScreenDistrictFocused />
          </div>
        </DCArtboard>

        <DCArtboard id="screen-4" label="04 · Hover popovers (state · district)" width={1000} height={680}>
          <div className="mv-canvas-frame" style={{ width: '100%', height: '100%' }}>
            <ScreenPopovers />
          </div>
        </DCArtboard>

        <DCArtboard id="screen-5" label="05 · Markers + status states" width={1000} height={680}>
          <div className="mv-canvas-frame" style={{ width: '100%', height: '100%' }}>
            <ScreenMarkers />
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
