<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BallotTab · CivicLens</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="seed.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas
          title="CivicLens · BallotTab"
          subtitle="Verified citizen ballot view · Maria Hendricks · FL-19 · Naples FL · May 3, 2026"
        >
          <DCSection id="overview" title="Overview">
            <DCArtboard id="s1" label="01 · Ballot tab default" width={460} height={1180}>
              <div style={{ padding: 20, background: 'var(--cl-bg)', height: '100%' }}>
                <Screen1Default />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="detail" title="Election detail">
            <DCArtboard id="s2" label="02 · Florida Primary detail" width={460} height={1900}>
              <div style={{ padding: 20, background: 'var(--cl-bg)', height: '100%' }}>
                <Screen2Detail />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="components" title="Component fidelity">
            <DCArtboard id="s3" label="03 · Race + candidate states" width={460} height={1000}>
              <div style={{ padding: 20, background: 'var(--cl-bg)', height: '100%' }}>
                <Screen3Race />
              </div>
            </DCArtboard>
            <DCArtboard id="s4" label="04 · Ballot measure states" width={460} height={1820}>
              <div style={{ padding: 20, background: 'var(--cl-bg)', height: '100%' }}>
                <Screen4Measure />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="states" title="Edge states">
            <DCArtboard id="s5a" label="05a · Loading" width={460} height={900}>
              <div style={{ padding: 20, background: 'var(--cl-bg)', height: '100%' }}>
                <Screen5aLoading />
              </div>
            </DCArtboard>
            <DCArtboard id="s5b" label="05b · Empty (off-cycle)" width={460} height={620}>
              <div style={{ padding: 20, background: 'var(--cl-bg)', height: '100%' }}>
                <Screen5bEmpty />
              </div>
            </DCArtboard>
            <DCArtboard id="s5c" label="05c · Not registered" width={460} height={680}>
              <div style={{ padding: 20, background: 'var(--cl-bg)', height: '100%' }}>
                <Screen5cNotRegistered />
              </div>
            </DCArtboard>
            <DCArtboard id="s5d" label="05d · Out-of-state visitor" width={460} height={920}>
              <div style={{ padding: 20, background: 'var(--cl-bg)', height: '100%' }}>
                <Screen5dVisitor />
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
