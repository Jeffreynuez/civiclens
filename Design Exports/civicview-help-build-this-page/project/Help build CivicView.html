<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Help build CivicView — design exploration</title>
<link rel="stylesheet" href="help-build/colors_and_type.css" />
<link rel="stylesheet" href="help-build/page.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: var(--cl-font-sans); background: #f0eee9; }

  /* In-canvas overrides: the page lives inside a fixed-size artboard,
     so position:fixed has no useful meaning. Pin the mobile CTA to the
     artboard bottom via absolute positioning instead. */
  .dc-card .hb-sticky-cta {
    position: absolute;
    /* parent artboard sets bounds; sticky CTA sits at its bottom edge */
  }
  .dc-card .hb-page { position: relative; }

  /* Plan / cover note used as the first row of the canvas */
  .hb-cover {
    width: 100%; height: 100%;
    background: white;
    border-radius: 14px;
    padding: 40px 44px;
    font-family: var(--cl-font-sans);
    color: var(--cl-text);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .hb-cover h1 {
    font-family: var(--cl-font-display);
    font-size: 2.1rem; font-weight: 700; letter-spacing: -0.02em;
    margin: 0; line-height: 1.1;
  }
  .hb-cover h1 em {
    font-style: normal;
    background: linear-gradient(180deg, transparent 64%, rgba(255, 186, 8, 0.42) 64%, rgba(255, 186, 8, 0.42) 92%, transparent 92%);
    padding: 0 4px;
  }
  .hb-cover__meta {
    display: flex; gap: 18px; flex-wrap: wrap;
    margin-top: 12px;
    font-size: var(--cl-text-xs);
    color: var(--cl-text-muted);
  }
  .hb-cover__meta span { display: inline-flex; align-items: center; gap: 6px; }
  .hb-cover__meta .dot { width: 4px; height: 4px; border-radius: 999px; background: var(--cl-text-muted); }

  .hb-cover__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 24px;
  }
  .hb-cover__pillar {
    padding: 16px 18px;
    background: var(--cl-bg);
    border: 1px solid var(--cl-border);
    border-radius: 10px;
  }
  .hb-cover__pillar .eye {
    font-size: 0.62rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cl-accent);
  }
  .hb-cover__pillar h3 {
    font-size: var(--cl-text-md);
    font-weight: 700;
    margin: 4px 0 6px;
    line-height: 1.25;
  }
  .hb-cover__pillar p {
    margin: 0;
    font-size: var(--cl-text-xs);
    color: var(--cl-text-light);
    line-height: 1.5;
  }

  .hb-cover__sys {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--cl-divider);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 24px;
  }
  .hb-cover__sys h4 {
    font-size: 0.62rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cl-text-muted);
    margin: 0 0 8px;
  }
  .hb-cover__chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .hb-cover__chip {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 999px;
    background: var(--cl-bg-soft);
    border: 1px solid var(--cl-border);
    color: var(--cl-text);
  }
  .hb-cover__chip--accent {
    background: var(--cl-warning-soft);
    border-color: var(--cl-warning-border);
    color: var(--cl-warning-deep);
  }
  .hb-cover__chip--green {
    background: var(--cl-success-soft);
    border-color: var(--cl-success-border);
    color: var(--cl-success-text);
  }
  .hb-cover__sys-notes {
    font-size: var(--cl-text-xs);
    color: var(--cl-text-light);
    line-height: 1.6;
  }
  .hb-cover__sys-notes li { margin-bottom: 4px; }

  /* Annotation pins overlaying artboards */
  .hb-pin-host { position: relative; }
  .hb-pin {
    position: absolute;
    z-index: 50;
    display: flex; gap: 0;
    align-items: flex-start;
    pointer-events: none;
  }
  .hb-pin__dot {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 999px;
    background: var(--cl-warning);
    color: var(--cl-text);
    font-size: 0.8rem;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 5px rgba(255,186,8,0.22), 0 3px 8px rgba(0,0,0,0.18);
  }
  .hb-pin__bubble {
    margin-left: 10px; margin-top: 2px;
    max-width: 280px;
    background: var(--cl-text);
    color: var(--cl-text-on-dark);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: var(--cl-text-xs);
    line-height: 1.5;
    box-shadow: var(--cl-shadow-pop);
  }
  .hb-pin__bubble strong {
    color: var(--cl-warning);
    display: block;
    font-weight: 700; font-size: 0.66rem;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 2px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="help-build/design-canvas.jsx"></script>
<script type="text/babel" src="help-build/Icons.jsx"></script>
<script type="text/babel" src="help-build/data.jsx"></script>
<script type="text/babel" src="help-build/HelpBuildPage.jsx"></script>

<script type="text/babel">
const { useState } = React;
const HelpBuildPage = window.HelpBuildPage;

/* Cover note — design plan + system summary */
function Cover() {
  return (
    <div className="hb-cover">
      <div className="cl-eyebrow" style={{color: 'var(--cl-accent)'}}>CivicView · /help-build · v1</div>
      <h1>The trust artifact, redesigned.<br/>
        Receipts <em>up front</em>, mission as the hook, donation as the obvious next step.
      </h1>
      <div className="hb-cover__meta">
        <span>Designed against CivicLens tokens (Geist, navy + warning yellow, success-text green for cost amounts)</span>
        <span className="dot"></span>
        <span>Light-mode page, dark hero</span>
        <span className="dot"></span>
        <span>Six artboards across three sections below</span>
      </div>

      <div className="hb-cover__grid">
        <div className="hb-cover__pillar">
          <div className="eye">Tone</div>
          <h3>Kickstarter rigor, annual-report tone</h3>
          <p>Hero asks. Body explains. Every funding line cites its number. The "no equity, no ads" phrase is preserved verbatim &mdash; it's load-bearing.</p>
        </div>
        <div className="hb-cover__pillar">
          <div className="eye">Hierarchy</div>
          <h3>Receipts before the wish list</h3>
          <p>Funding section opens by default. Shipped + roadmap collapse below the fold. The 22-item shipped list is volume-as-trust-signal &mdash; not truncated.</p>
        </div>
        <div className="hb-cover__pillar">
          <div className="eye">CTA contract</div>
          <h3>Two states, both intentional</h3>
          <p>Live: yellow pill with subtle glow. Pending: dashed yellow ghost with a slow pulse &mdash; <em>"not a missing button, an upcoming one"</em>.</p>
        </div>
      </div>

      <div className="hb-cover__sys">
        <div>
          <h4>Tokens reused</h4>
          <div className="hb-cover__chips">
            <span className="hb-cover__chip">--cl-primary navy</span>
            <span className="hb-cover__chip hb-cover__chip--accent">--cl-warning yellow</span>
            <span className="hb-cover__chip hb-cover__chip--green">--cl-success-text</span>
            <span className="hb-cover__chip">--cl-bg-soft</span>
            <span className="hb-cover__chip">--cl-radius-2xl (14px)</span>
            <span className="hb-cover__chip">--cl-font-display Geist</span>
            <span className="hb-cover__chip">--cl-font-mono on costs</span>
          </div>
        </div>
        <div>
          <h4>What's new vs. current build</h4>
          <ol className="hb-cover__sys-notes" style={{margin:0, paddingLeft:18}}>
            <li>Hero gets a faint civic-tech watermark + warning-yellow highlight under "here's your rep."</li>
            <li>Progress meter strip is new &mdash; total-to-fund, percent bubble, three KPI tiles.</li>
            <li>Funding rows split into <em>One-time</em> + <em>Recurring</em> clusters with subtotals.</li>
            <li>Each money row gets a "Fund this line" pill that gracefully degrades pre-launch.</li>
            <li>Roadmap shifts from list to dashed feature cards &mdash; reads as wish list, not quote.</li>
            <li><em>Polish for the DS:</em> the "How to read this" yellow callout could become two reusable variants — <strong>informational</strong> (this) vs. <strong>caution</strong> (the existing suspend-modal hide-content note).</li>
          </ol>
        </div>
      </div>
    </div>
  );
}

/* Annotation overlay */
function Pin({ x, y, n, title, children }) {
  return (
    <div className="hb-pin" style={{ left: x, top: y }}>
      <div className="hb-pin__dot">{n}</div>
      <div className="hb-pin__bubble">
        <strong>{title}</strong>
        {children}
      </div>
    </div>
  );
}

function App() {
  const DesignCanvas = window.DesignCanvas;
  const DCSection = window.DCSection;
  const DCArtboard = window.DCArtboard;
  return (
    <DesignCanvas
      title="Help build CivicView"
      subtitle="A trust artifact for the public-fundraise — receipts, mission, donation."
    >
      <DCSection id="intro" title="01 · Brief" subtitle="Plan + design system summary">
        <DCArtboard id="cover" label="Cover" width={1100} height={560}>
          <Cover />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="viewports"
        title="02 · Viewport variants"
        subtitle="Default state — Money section open, others collapsed, crowdfund pre-launch."
      >
        <DCArtboard id="desktop" label="Desktop · 1440" width={1440} height={2960}>
          <div className="hb-pin-host" style={{ height: '100%' }}>
            <HelpBuildPage variant="desktop" crowdfundLive={false} openSections={new Set(['money'])} />
            <Pin x={1090} y={500} n="1" title="Disabled CTA, on-brand">
              Dashed yellow ghost with a slow pulse dot. Reads as "coming soon" rather than "broken button".
            </Pin>
            <Pin x={1090} y={770} n="2" title="Progress · pre-launch">
              Bar fills with a diagonal hatch. The headline number shifts from "raised" to "to fully unlock" — same chrome, different role.
            </Pin>
            <Pin x={1090} y={1290} n="3" title="Open by default">
              Funding section is the trust artifact — receipts visible on first paint. Shipped + progress + roadmap stay collapsed.
            </Pin>
            <Pin x={1090} y={1900} n="4" title="Fund-this-line">
              Per-row yellow pill in the live state; soft-yellow dashed in pre-launch (still on-brand, signals "reserved").
            </Pin>
          </div>
        </DCArtboard>

        <DCArtboard id="tablet" label="Tablet · 820" width={820} height={3400}>
          <HelpBuildPage variant="tablet" crowdfundLive={false} openSections={new Set(['money'])} />
        </DCArtboard>

        <DCArtboard id="mobile-prelaunch" label="Mobile · 390 · pre-launch" width={390} height={3680}>
          <div className="hb-pin-host" style={{ height: '100%' }}>
            <HelpBuildPage variant="mobile" crowdfundLive={false} openSections={new Set(['money'])} />
            <Pin x={30} y={500} n="5" title="Hatched bar, pre-launch tile">
              The stub state has to fit a 390 viewport without breaking. "Pre launch" + em-dash tiles read cleanly.
            </Pin>
          </div>
        </DCArtboard>

        <DCArtboard id="mobile" label="Mobile · 390 · live state" width={390} height={3680}>
          <div className="hb-pin-host" style={{ height: '100%' }}>
            <HelpBuildPage variant="mobile" crowdfundLive={true} openSections={new Set(['money'])} />
            <Pin x={30} y={3540} n="6" title="Sticky CTA">
              Anchored to the bottom of the viewport on every scroll position. The whole point of the page is one-tap-to-donate.
            </Pin>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="states"
        title="03 · CTA states — side by side"
        subtitle="Hero with the crowdfund pending vs. live. Both states are intentional; the pending one is not a gray-ghost."
      >
        <DCArtboard id="hero-pending" label="A · Pending (default at launch)" width={820} height={560}>
          <div className="hb-page" style={{ background: 'var(--cl-bg)', padding: 24, height: '100%' }}>
            {React.createElement(window.HBHero, { crowdfundLive: false })}
          </div>
        </DCArtboard>
        <DCArtboard id="hero-live" label="B · Live" width={820} height={560}>
          <div className="hb-page" style={{ background: 'var(--cl-bg)', padding: 24, height: '100%' }}>
            {React.createElement(window.HBHero, { crowdfundLive: true })}
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="meter-states"
        title="04 · Progress meter — side by side"
        subtitle="Pre-launch stub vs. populated live state. Both share the same chrome; the stub uses a hatched bar + em-dash tiles."
      >
        <DCArtboard id="meter-pending" label="A · Pre-launch stub" width={820} height={300}>
          <div className="hb-page" style={{ background: 'var(--cl-bg)', padding: 24, height: '100%' }}>
            {React.createElement(window.HBProgress, { crowdfundLive: false })}
          </div>
        </DCArtboard>
        <DCArtboard id="meter-live" label="B · Live · $4,820 of $15,300" width={820} height={300}>
          <div className="hb-page" style={{ background: 'var(--cl-bg)', padding: 24, height: '100%' }}>
            {React.createElement(window.HBProgress, { crowdfundLive: true })}
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="everything-open"
        title="05 · Everything open · Desktop 1440"
        subtitle="Full information architecture expanded — verifies the 22-item shipped list lays out cleanly, the funding clusters group correctly, and the roadmap reads as a wish list."
      >
        <DCArtboard id="desktop-open" label="Desktop · 1440 · all sections open" width={1440} height={5400}>
          <HelpBuildPage variant="desktop" crowdfundLive={true} openSections={new Set(['shipped','progress','money','roadmap'])} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
