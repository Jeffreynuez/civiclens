<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CivicLens — Loading & Empty States</title>
  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="skeletons.jsx"></script>
  <script type="text/babel" src="empty-states.jsx"></script>
  <script type="text/babel" src="error-states.jsx"></script>
  <script type="text/babel" src="progress-states.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

    function CoverArtboard() {
      return (
        <div className="ab ab--white" style={{ padding: 40 }}>
          <div className="ab__caption">CivicLens · Vol 04</div>
          <h1 style={{
            fontSize: 'var(--cl-text-3xl)',
            fontWeight: 700,
            letterSpacing: 'var(--cl-tracking-tight)',
            lineHeight: 1.15,
            margin: '0 0 16px',
            color: 'var(--cl-text)',
            maxWidth: 460,
            textWrap: 'pretty',
          }}>
            Loading and emptiness should feel intentional.
          </h1>
          <p style={{
            fontSize: 'var(--cl-text-md)',
            lineHeight: 'var(--cl-leading-normal)',
            color: 'var(--cl-text-light)',
            margin: 0,
            maxWidth: 460,
          }}>
            A small vocabulary every CivicLens surface pulls from. Skeletons that
            match the shape of what they precede. Empty states that never blame
            the user. Errors that don't shout. Progress that doesn't lie.
          </p>

          <div style={{ marginTop: 32, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, maxWidth: 460 }}>
            <div className="annot"><strong>1 · Loading</strong><br/>Skeletons + spinner</div>
            <div className="annot"><strong>2 · Empty</strong><br/>Reusable shell, 6 surfaces</div>
            <div className="annot"><strong>3 · Errors</strong><br/>Network, 404, scope</div>
            <div className="annot"><strong>4 · Progress</strong><br/>Upload + vote-in-flight</div>
          </div>

          <div style={{ marginTop: 'auto', paddingTop: 24, borderTop: '1px solid var(--cl-border)', fontSize: 'var(--cl-text-xs)', color: 'var(--cl-text-muted)' }}>
            Light mode · Desktop · Geist · Phosphor Duotone · Skeleton shimmer 1.4s · State change 220ms
          </div>
        </div>
      );
    }

    /* Section 1 — three artboards on canvas */
    function SkelCardArtboard({ withThumb }) {
      return (
        <div className="ab ab--shaded">
          <div className="ab__caption">A · Card skeleton {withThumb ? '— with thumbnail' : ''}</div>
          <div className="surface-frame">
            <window.CardSkeleton withThumb={withThumb} />
          </div>
          <p className="ab__sub">
            Mirrors PostCard geometry: 40&nbsp;px avatar circle, 60% / 40% header bars,
            three body lines at 100% / 95% / 70%, optional 16:9 thumbnail. Shimmer
            sweeps left-to-right on a 1.4s ease-in-out loop —
            <strong> calm, not anxious</strong>.
          </p>
        </div>
      );
    }

    function ListSkelArtboard() {
      return (
        <div className="ab ab--shaded">
          <div className="ab__caption">B · List skeleton</div>
          <div className="surface-frame">
            <window.ListSkeleton />
          </div>
          <p className="ab__sub">
            Stack of four abbreviated cards, opacity stepped 100 → 90 → 80 → 70%
            so it reads as <strong>"more loading below the fold."</strong> The
            container itself doesn't fade — only the cards do.
          </p>
        </div>
      );
    }

    function SpinnerArtboard() {
      return (
        <div className="ab ab--shaded">
          <div className="ab__caption">C · Inline spinner</div>
          <window.InlineSpinnerDemo />
          <p className="ab__sub" style={{ marginTop: 'auto' }}>
            16&nbsp;px ring, 2&nbsp;px stroke, accent green leader on a low-alpha
            track. <strong>Never appears alongside a label</strong> inside a
            primary CTA — it replaces it.
          </p>
        </div>
      );
    }

    /* Section 2 — empty states */
    function EmptyTemplateArtboard() {
      const Icon = window.Icon.ChatCircleDots;
      return (
        <div className="ab ab--shaded">
          <div className="ab__caption">Reusable shell — full fidelity</div>
          <window.EmptyState
            icon={Icon}
            headline="No recent activity yet"
            body={"When your tracked reps post, when polls you voted on close, or when someone replies to your comments \u2014 it\u2019ll show up here."}
            cta={{ label: 'Track more reps →' }}
            secondary="Learn how tracking works"
          />
          <div style={{ marginTop: 24, display: 'grid', gridTemplateColumns: '120px 1fr', gap: '6px 18px' }}>
            <div className="annot"><strong>Icon</strong></div>
            <div className="annot">Phosphor Duotone, 56–64&nbsp;px, accent green at 30% opacity, 88&nbsp;px soft tint plate behind.</div>
            <div className="annot"><strong>Headline</strong></div>
            <div className="annot">One short sentence, sentence case. Never blames the user.</div>
            <div className="annot"><strong>Body</strong></div>
            <div className="annot">1–2 sentences explaining what comes next. Concrete, not aspirational.</div>
            <div className="annot"><strong>CTA</strong></div>
            <div className="annot">Optional primary green button. Optional secondary link. Both optional.</div>
          </div>
        </div>
      );
    }

    function EmptyGridArtboard() {
      return (
        <div className="ab ab--shaded">
          <div className="ab__caption">Six instantiations</div>
          <window.EmptyStateGrid />
          <p className="ab__sub">
            Same shell, six surfaces. Surface 03 (No comments) and 04 (No search
            results) <strong>intentionally have no CTA</strong> because the
            composer / search input below the empty card already carries the
            next action. Every other surface needs an exit.
          </p>
        </div>
      );
    }

    /* Section 3 — errors */
    function ErrorArtboard() {
      return (
        <div className="ab ab--shaded">
          <div className="ab__caption">Errors — same shell, warning iconography</div>
          <window.ErrorStates />
          <p className="ab__sub">
            Same shell as empty states; only the icon glyph and plate color change.
            Network and 404 use <strong>burgundy</strong> (the down-react /
            disagreement token, not destructive red). Scope-mismatch uses
            <strong> warning yellow</strong> because it's informational, not
            broken — the user is in the wrong room, not stuck.
          </p>
        </div>
      );
    }

    /* Section 4 — progress */
    function UploadArtboard() {
      return (
        <div className="ab ab--shaded">
          <div className="ab__caption">A · Image upload progress</div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 1 }}>
            <window.ImageUploadProgress />
          </div>
          <p className="ab__sub" style={{ marginTop: 0 }}>
            Thumbnail tile (the upload itself) with a 45% navy overlay; circular
            ring is accent green over a low-alpha white track. Determinate %
            inside. <strong>Caption uses tabular nums</strong> so "2 of 5" doesn't
            jiggle as the count advances.
          </p>
        </div>
      );
    }

    function VoteArtboard() {
      return (
        <div className="ab ab--shaded">
          <div className="ab__caption">B · Vote-in-flight</div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 1 }}>
            <window.VoteInFlight />
          </div>
        </div>
      );
    }

    function PrinciplesArtboard() {
      const principles = [
        ['Skeletons match shape',  'No generic gray rectangles. The card skeleton mirrors the PostCard it precedes — same avatar size, same body rhythm, same footer slots.'],
        ['Calm, not anxious',      'Shimmer is 1.4s ease-in-out. Spinners are 0.9s linear. Nothing strobes; nothing pulses faster than a heartbeat.'],
        ['Never blame the user',   '"No recent activity yet" — never "You haven\u2019t followed anyone." The system is empty, not the user.'],
        ['Honest about scope',     'Scope-mismatch tells you exactly which district is showing and which one you\u2019re verified for. No vague "Access denied."'],
        ['Every empty has an exit', 'CTA or implicit next action. The only exception: in-context empties where the composer or input below carries the intent.'],
        ['Progress doesn\u2019t lie',     'Determinate % when we know it (uploads). Indeterminate spinner when we don\u2019t. Never a fake progress bar tied to setTimeout.'],
      ];

      return (
        <div className="ab ab--white" style={{ padding: 36 }}>
          <div className="ab__caption">Six principles to enforce</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px 28px', marginTop: 8 }}>
            {principles.map(([h, b], i) => (
              <div key={i}>
                <div style={{
                  fontSize: 'var(--cl-text-2xs)',
                  fontWeight: 800,
                  letterSpacing: 'var(--cl-tracking-wide)',
                  textTransform: 'uppercase',
                  color: 'var(--cl-accent)',
                  marginBottom: 6,
                  fontVariantNumeric: 'tabular-nums',
                }}>0{i + 1}</div>
                <h4 style={{
                  fontSize: 'var(--cl-text-md)',
                  fontWeight: 700,
                  margin: '0 0 4px',
                  color: 'var(--cl-text)',
                  letterSpacing: 'var(--cl-tracking-tight)',
                }}>{h}</h4>
                <p style={{
                  fontSize: 'var(--cl-text-xs)',
                  color: 'var(--cl-text-light)',
                  lineHeight: 'var(--cl-leading-normal)',
                  margin: 0,
                  textWrap: 'pretty',
                }}>{b}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="cover" title="CivicLens · Loading & Empty States" subtitle="A unified vocabulary across every surface">
            <DCArtboard id="cover" label="Brief" width={620} height={520}>
              <CoverArtboard />
            </DCArtboard>
            <DCArtboard id="principles" label="Principles" width={760} height={520}>
              <PrinciplesArtboard />
            </DCArtboard>
          </DCSection>

          <DCSection id="loading" title="1 · Loading patterns" subtitle="Skeletons match the shape of what they precede; spinners replace labels">
            <DCArtboard id="card-thumb" label="A · Card skeleton (with thumb)" width={460} height={620}>
              <SkelCardArtboard withThumb />
            </DCArtboard>
            <DCArtboard id="card-no-thumb" label="A · Card skeleton (text-only)" width={460} height={500}>
              <SkelCardArtboard />
            </DCArtboard>
            <DCArtboard id="list" label="B · List skeleton" width={460} height={620}>
              <ListSkelArtboard />
            </DCArtboard>
            <DCArtboard id="spinner" label="C · Inline spinner" width={520} height={500}>
              <SpinnerArtboard />
            </DCArtboard>
          </DCSection>

          <DCSection id="empty" title="2 · Empty states" subtitle="One shell, used six ways">
            <DCArtboard id="template" label="Template — full fidelity" width={520} height={680}>
              <EmptyTemplateArtboard />
            </DCArtboard>
            <DCArtboard id="instances" label="Six surfaces" width={1040} height={680}>
              <EmptyGridArtboard />
            </DCArtboard>
          </DCSection>

          <DCSection id="errors" title="3 · Error states" subtitle="Same shell, warning iconography">
            <DCArtboard id="errors" label="Network · 404 · Scope" width={1040} height={500}>
              <ErrorArtboard />
            </DCArtboard>
          </DCSection>

          <DCSection id="progress" title="4 · Progress states" subtitle="Determinate when we know; transient when we don't">
            <DCArtboard id="upload" label="A · Image upload" width={620} height={500}>
              <UploadArtboard />
            </DCArtboard>
            <DCArtboard id="vote" label="B · Vote-in-flight" width={500} height={500}>
              <VoteArtboard />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
