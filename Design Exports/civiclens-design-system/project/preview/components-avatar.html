<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Avatar</title></head>
<body>
<style>
  .av { width:48px; height:48px; border-radius:999px; background:#f8f9fa; display:flex; align-items:center; justify-content:center; color:#2d6a4f; font-weight:700; font-size:1rem; border:1px solid #e6f3ec; }
  .av-lg { width:72px; height:72px; font-size:1.4rem; }
  .av-sm { width:32px; height:32px; font-size:0.78rem; }
  .av-rep { background:#1b263b; color:white; border-color:#1b263b; }
</style>
<div style="display:flex; gap:14px; align-items:center;">
  <div class="av av-lg av-rep">BD</div>
  <div class="av">MH</div>
  <div class="av av-sm">JR</div>
  <div style="display:flex; flex-direction:column; gap:2px;">
    <div style="font-size:0.78rem; font-weight:700;">Initials only — no photos for citizens</div>
    <div style="font-size:0.72rem; color:#555;">Reps use a navy fill; citizens use the soft-green fill.</div>
  </div>
</div>
</body></html>
