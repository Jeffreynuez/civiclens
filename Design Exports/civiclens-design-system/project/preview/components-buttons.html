<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Buttons</title></head>
<body>
<style>
  .btn { font: inherit; display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; font-size:0.85rem; font-weight:600; border:1px solid transparent; cursor:pointer; }
  .btn-primary { background:#2d6a4f; color:white; }
  .btn-primary:hover { background:#40916c; }
  .btn-secondary { background:white; color:#2d6a4f; border-color:#2d6a4f; }
  .btn-ghost { background:transparent; color:#1a1a2e; border-color:#dee2e6; }
  .btn-warning { background:#ffba08; color:#1a1a2e; }
  .btn-danger { background:white; color:#d63031; border-color:#f5c2c7; }
  .btn-disabled { background:#f1f3f5; color:#adb5bd; cursor:not-allowed; }
</style>
<div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
  <button class="btn btn-primary">Publish post</button>
  <button class="btn btn-secondary">Follow</button>
  <button class="btn btn-ghost">Cancel</button>
  <button class="btn btn-warning">Subscribe</button>
  <button class="btn btn-danger">Delete</button>
  <button class="btn btn-disabled" disabled>Vote</button>
</div>
<div style="margin-top:10px; font-size:11px; color:var(--cl-text-light); line-height:1.55;">Primary green for owner CTAs · Secondary outline for engagement · Warning yellow reserved for Subscribe + tracked badges (legacy) · Danger always outlined.</div>
</body></html>
