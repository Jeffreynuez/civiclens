<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Stat Card</title></head>
<body>
<style>
  .stat { background:white; border:1px solid #dee2e6; border-radius:12px; padding:14px; }
  .stat .eyebrow { font-size:0.68rem; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:#555; }
  .stat .num { font-size:1.5rem; font-weight:700; font-variant-numeric:tabular-nums; margin-top:4px; }
  .stat .delta { font-size:0.72rem; color:#1877f2; margin-top:2px; }
  .stat .delta.down { color:#c33333; }
</style>
<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
  <div class="stat">
    <div class="eyebrow">Posts (7d)</div>
    <div class="num">12</div>
    <div class="delta">+3 vs prev wk</div>
  </div>
  <div class="stat">
    <div class="eyebrow">Reactions</div>
    <div class="num">1,247</div>
    <div class="delta">+312</div>
  </div>
  <div class="stat">
    <div class="eyebrow">Engaged citizens</div>
    <div class="num">42 <span style="font-size:11px; color:#6c757d; font-weight:500;">/ 60</span></div>
    <div class="delta down">−4</div>
  </div>
</div>
</body></html>
