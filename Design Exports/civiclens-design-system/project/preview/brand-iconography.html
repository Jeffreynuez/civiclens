<!doctype html>
<html><head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_shared.css" />
<title>Iconography</title>
<style>
  .icon-row { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; }
  .icon-cell {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:10px 6px; background:white;
    border:1px solid var(--cl-border); border-radius:10px;
    transition: background var(--cl-duration-fast) var(--cl-ease-standard),
                border-color var(--cl-duration-fast) var(--cl-ease-standard);
  }
  .icon-cell svg {
    color: var(--ico-stroke, #1a1a2e);
    fill:  var(--ico-fill, rgba(45,106,79,0.28));
  }
  .icon-cell .nm { font-size:0.62rem; color:#555; font-family:var(--cl-font-mono); letter-spacing:0; }
  .icon-cell.active { background:#e6f3ec; border-color:#2d6a4f; }
  .icon-cell.active svg { color:#2d6a4f; fill:#2d6a4f; }
  .icon-cell.danger.active { background:var(--cl-down-soft); border-color:var(--cl-down); }
  .icon-cell.danger.active svg { color:var(--cl-down); fill:var(--cl-down); }

  .legend { display:flex; gap:14px; margin-top:14px; align-items:center; flex-wrap:wrap; }
  .legend .sw { display:inline-flex; align-items:center; gap:6px; font-size:0.7rem; color:#555; }
  .legend .sw .chip { display:inline-block; width:14px; height:14px; border-radius:3px; border:1px solid #dee2e6; }

  .caption { margin-top:14px; font-size:11px; color:#555; line-height:1.55; max-width:640px; }
  .caption code { font-family:var(--cl-font-mono); background:#f1f3f5; padding:1px 4px; border-radius:3px; font-size:10px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "iconSize": 26,
  "strokeWidth": 2,
  "fillOpacity": 28,
  "showActiveState": true,
  "sharpCaps": true
}/*EDITMODE-END*/;

// Icon glyph library — all 24×24, ordered for the grid.
// `active` keys identify which cells get the "interactive on" state.
const ICONS = [
  { id:'search', label:'search · active', active:true, draw: ({sw}) => (
    <>
      <circle cx="11" cy="11" r="7" fill="currentColor" opacity="1" stroke="currentColor" strokeWidth={sw} />
      <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  // Bell — three explicit states. Resting is the default. Unread carries an
  // amber dot (the badge does the unread work, NOT a fill flip). Dropdown-open
  // is the only state that earns the fully-filled accent treatment.
  { id:'bell', label:'bell · resting', draw: ({sw}) => (
    <>
      <path d="M5 17 V11 a7 7 0 0 1 14 0 V17 L21 19 H3 Z" stroke="currentColor" strokeWidth={sw} />
      <path d="M9.5 21 a2.5 2.5 0 0 0 5 0" fill="none" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'bell-unread', label:'bell · unread', draw: ({sw}) => (
    <>
      <path d="M5 17 V11 a7 7 0 0 1 14 0 V17 L21 19 H3 Z" stroke="currentColor" strokeWidth={sw} />
      <path d="M9.5 21 a2.5 2.5 0 0 0 5 0" fill="none" stroke="currentColor" strokeWidth={sw} />
      {/* badge — solid amber dot, no count for the small-icon size; navbar adds count at 18px+ */}
      <circle cx="19" cy="6" r="3" fill="#ffba08" stroke="white" strokeWidth="1.5" />
    </>
  )},
  { id:'bell-open', label:'bell · open', active:true, draw: ({sw}) => (
    <>
      <path d="M5 17 V11 a7 7 0 0 1 14 0 V17 L21 19 H3 Z" stroke="currentColor" strokeWidth={sw} />
      <path d="M9.5 21 a2.5 2.5 0 0 0 5 0" fill="none" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'file-search', label:'file-search', draw: ({sw}) => (
    <>
      <path d="M5 3 H14 L19 8 V21 H5 Z" stroke="currentColor" strokeWidth={sw} />
      <path d="M14 3 V8 H19" fill="none" stroke="currentColor" strokeWidth={sw} />
      <circle cx="13" cy="14" r="2.5" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="15" y1="16" x2="17" y2="18" fill="none" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'map-pin', label:'map-pin', draw: ({sw}) => (
    <>
      <path d="M12 22 C 6 14 4 11 4 8 a8 8 0 0 1 16 0 c0 3-2 6-8 14 Z" stroke="currentColor" strokeWidth={sw} />
      <circle cx="12" cy="8" r="2.6" fill="white" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'thumbs-up', label:'thumbs-up', draw: ({sw}) => (
    <>
      <path d="M3 10 H7 V21 H3 Z" fill="none" stroke="currentColor" strokeWidth={sw} />
      <path d="M7 10 L11 3 a2 2 0 0 1 3 2 V9 H20 a1.5 1.5 0 0 1 1.5 1.8 L19.6 19 a2 2 0 0 1 -2 1.5 H7 Z" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  // NEW — thumbs-down (mirror of thumbs-up)
  { id:'thumbs-down', label:'thumbs-down', danger:true, draw: ({sw}) => (
    <>
      <path d="M3 3 H7 V14 H3 Z" fill="none" stroke="currentColor" strokeWidth={sw} />
      <path d="M7 14 L11 21 a2 2 0 0 0 3 -2 V15 H20 a1.5 1.5 0 0 0 1.5 -1.8 L19.6 5 a2 2 0 0 0 -2 -1.5 H7 Z" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'chat', label:'chat', draw: ({sw}) => (
    <path d="M3 5 H21 V17 H13 L8 21 V17 H3 Z" stroke="currentColor" strokeWidth={sw} />
  )},
  { id:'ballot', label:'ballot', draw: ({sw}) => (
    <>
      <rect x="5" y="4" width="14" height="17" stroke="currentColor" strokeWidth={sw} />
      <rect x="9" y="2" width="6" height="4" fill="white" stroke="currentColor" strokeWidth={sw} />
      <line x1="9" y1="11" x2="15" y2="11" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="9" y1="14" x2="15" y2="14" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="9" y1="17" x2="13" y2="17" fill="none" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'check-circle', label:'check-circle', draw: ({sw}) => (
    <>
      <circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth={sw} />
      <polyline points="8,12 11,15 16,9" fill="none" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'buildings', label:'buildings', draw: ({sw}) => (
    <>
      <rect x="3" y="9" width="8" height="12" stroke="currentColor" strokeWidth={sw} />
      <rect x="11" y="4" width="10" height="17" stroke="currentColor" strokeWidth={sw} />
      <line x1="14" y1="8" x2="18" y2="8" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="14" y1="12" x2="18" y2="12" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="14" y1="16" x2="18" y2="16" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="6" y1="13" x2="8" y2="13" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="6" y1="17" x2="8" y2="17" fill="none" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'flag', label:'flag', draw: ({sw}) => (
    <>
      <path d="M5 3 V21" fill="none" stroke="currentColor" strokeWidth={sw} />
      <path d="M5 4 H19 L16 9 L19 14 H5 Z" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'user', label:'user', draw: ({sw}) => (
    <>
      <circle cx="12" cy="9" r="4" stroke="currentColor" strokeWidth={sw} />
      <path d="M4 21 a8 8 0 0 1 16 0 Z" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'calendar', label:'calendar', draw: ({sw}) => (
    <>
      <rect x="3" y="5" width="18" height="16" stroke="currentColor" strokeWidth={sw} />
      <line x1="3" y1="10" x2="21" y2="10" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="8" y1="3" x2="8" y2="7" fill="none" stroke="currentColor" strokeWidth={sw} />
      <line x1="16" y1="3" x2="16" y2="7" fill="none" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  { id:'chart-bar', label:'chart-bar', draw: ({sw}) => (
    <>
      <line x1="3" y1="21" x2="21" y2="21" fill="none" stroke="currentColor" strokeWidth={sw} />
      <rect x="5" y="13" width="3" height="8" stroke="currentColor" strokeWidth={sw} />
      <rect x="10.5" y="9" width="3" height="12" stroke="currentColor" strokeWidth={sw} />
      <rect x="16" y="5" width="3" height="16" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  // NEW — image (post upload, post composer)
  { id:'image', label:'image', draw: ({sw}) => (
    <>
      <rect x="3" y="5" width="18" height="14" rx="1.5" stroke="currentColor" strokeWidth={sw} />
      <circle cx="8.5" cy="10" r="1.6" fill="white" stroke="currentColor" strokeWidth={sw} />
      <path d="M3 17 L9 12 L13 16 L17 13 L21 17 V19 H3 Z" stroke="currentColor" strokeWidth={sw} />
    </>
  )},
  // NEW — x (close)
  { id:'x', label:'x · close', draw: ({sw}) => (
    <>
      <circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth={sw} />
      <line x1="8.5" y1="8.5" x2="15.5" y2="15.5" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" />
      <line x1="15.5" y1="8.5" x2="8.5" y2="15.5" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" />
    </>
  )},
];

function IconCard({ ico, t }) {
  const cls = [
    'icon-cell',
    ico.danger ? 'danger' : '',
    (ico.active && t.showActiveState) ? 'active' : ''
  ].filter(Boolean).join(' ');
  const linecap = t.sharpCaps ? 'butt' : 'round';
  const linejoin = t.sharpCaps ? 'miter' : 'round';
  return (
    <div className={cls} style={{
      ['--ico-fill']: `rgba(45,106,79,${t.fillOpacity / 100})`,
    }}>
      <svg viewBox="0 0 24 24" width={t.iconSize} height={t.iconSize}
           strokeLinecap={linecap} strokeLinejoin={linejoin}>
        {ico.draw({ sw: t.strokeWidth })}
      </svg>
      <span className="nm">{ico.label}</span>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <div className="icon-row">
        {ICONS.map(ic => <IconCard key={ic.id} ico={ic} t={t} />)}
      </div>

      <div className="legend">
        <span className="sw"><span className="chip" style={{background:'#1a1a2e'}}></span>Stroke · navy <code style={{fontFamily:'var(--cl-font-mono)', fontSize:'10px'}}>#1a1a2e</code></span>
        <span className="sw"><span className="chip" style={{background:`rgba(45,106,79,${t.fillOpacity/100})`}}></span>Duotone fill · accent @ {t.fillOpacity}%</span>
        <span className="sw"><span className="chip" style={{background:'#2d6a4f'}}></span>Active · solid accent</span>
        <span className="sw"><span className="chip" style={{background:'#c33333'}}></span>Danger · solid red (thumbs-down)</span>
      </div>

      <div className="caption">
        <strong>Phosphor Duotone</strong> direction — 24×24 viewBox, {t.strokeWidth}px outer stroke,
        {t.sharpCaps ? ' sharp ends ' : ' round ends '}
        (<code>stroke-linecap: {t.sharpCaps ? 'butt' : 'round'}</code>;
         <code>stroke-linejoin: {t.sharpCaps ? 'miter' : 'round'}</code>).
        <br/><br/>
        <strong>Bell semantics.</strong> The amber badge dot carries <em>"you have unread notifications."</em>
        The fully-filled accent state is reserved for <em>"dropdown is open"</em> only — do not flip the fill
        on unread. Rest → unread → open are three distinct states; navbar uses the badge variant by default,
        the open variant only while the dropdown is mounted.
        <br/><br/>
        <strong>thumbs-down</strong>, <strong>image</strong>, and <strong>x · close</strong> are added to
        cover dislike reactions, the post-composer image upload, and modal/page close affordances.
        Fallback: <strong>Tabler Icons</strong> at 2.5px.
      </div>

      <TweaksPanel title="Iconography tweaks">
        <TweakSection title="Geometry">
          <TweakSlider label="Icon size"     value={t.iconSize}    min={16} max={40} unit="px" onChange={v => setTweak('iconSize', v)} />
          <TweakSlider label="Stroke width"  value={t.strokeWidth} min={1}  max={3}  step={0.25} unit="px" onChange={v => setTweak('strokeWidth', v)} />
          <TweakToggle label="Sharp caps & joins" value={t.sharpCaps} onChange={v => setTweak('sharpCaps', v)} />
        </TweakSection>
        <TweakSection title="Fill & state">
          <TweakSlider label="Duotone fill opacity" value={t.fillOpacity} min={0} max={60} unit="%" onChange={v => setTweak('fillOpacity', v)} />
          <TweakToggle label="Show active state" value={t.showActiveState} onChange={v => setTweak('showActiveState', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
