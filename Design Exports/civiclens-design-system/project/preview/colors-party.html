<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Party colors</title></head>
<body>
<div class="grid" style="grid-template-columns: repeat(3, 1fr); gap:14px;">
  <div>
    <div style="display:flex; gap:6px; align-items:center;">
      <span style="display:inline-flex; align-items:center; justify-content:center; min-width:22px; padding:2px 7px; border-radius:12px; font-size:0.72rem; font-weight:800; background:#fde8e8; color:#e63946;">R</span>
      <strong style="font-size:13px;">Republican</strong>
    </div>
    <div class="row" style="margin-top:8px;">
      <div style="flex:1; height:46px; border-radius:8px; background:#e63946;"></div>
      <div style="flex:1; height:46px; border-radius:8px; background:#fde8e8; border:1px solid var(--cl-border);"></div>
    </div>
    <div class="hex" style="margin-top:6px;">#E63946 · #FDE8E8</div>
  </div>
  <div>
    <div style="display:flex; gap:6px; align-items:center;">
      <span style="display:inline-flex; align-items:center; justify-content:center; min-width:22px; padding:2px 7px; border-radius:12px; font-size:0.72rem; font-weight:800; background:#e3f0f7; color:#457b9d;">D</span>
      <strong style="font-size:13px;">Democrat</strong>
    </div>
    <div class="row" style="margin-top:8px;">
      <div style="flex:1; height:46px; border-radius:8px; background:#457b9d;"></div>
      <div style="flex:1; height:46px; border-radius:8px; background:#e3f0f7; border:1px solid var(--cl-border);"></div>
    </div>
    <div class="hex" style="margin-top:6px;">#457B9D · #E3F0F7</div>
  </div>
  <div>
    <div style="display:flex; gap:6px; align-items:center;">
      <span style="display:inline-flex; align-items:center; justify-content:center; min-width:22px; padding:2px 7px; border-radius:12px; font-size:0.72rem; font-weight:800; background:#f0eaff; color:#6c3ec1;">I</span>
      <strong style="font-size:13px;">Independent</strong>
    </div>
    <div class="row" style="margin-top:8px;">
      <div style="flex:1; height:46px; border-radius:8px; background:#6c3ec1;"></div>
      <div style="flex:1; height:46px; border-radius:8px; background:#f0eaff; border:1px solid var(--cl-border);"></div>
    </div>
    <div class="hex" style="margin-top:6px;">#6C3EC1 · #F0EAFF</div>
  </div>
</div>
<p style="margin:14px 0 0; font-size:11px; color:var(--cl-text-light); line-height:1.5;">Always paired soft + saturated. Pills only — never CTAs or backgrounds. Preserved unchanged from the codebase to keep party visual neutrality.</p>
</body></html>
