<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Type · Numerals</title></head>
<body>
<style>
  .num-row { display:flex; gap:24px; align-items:baseline; padding:6px 0; }
  .num-big { font-family:var(--cl-font-sans); font-size:1.7rem; font-weight:700; font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; letter-spacing:-0.01em; }
  .num-meta { font-family:var(--cl-font-sans); font-size:0.7rem; color:#555; }
  .stack { display:flex; flex-direction:column; }
</style>
<div class="num-row">
  <div class="stack"><span class="num-big">1,247</span><span class="num-meta">votes</span></div>
  <div class="stack"><span class="num-big">62%</span><span class="num-meta">leading option</span></div>
  <div class="stack"><span class="num-big">12 / 60</span><span class="num-meta">engaged · in scope</span></div>
  <div class="stack"><span class="num-big">2h 15m</span><span class="num-meta">closes in</span></div>
</div>
<div style="margin-top:12px; font-family:var(--cl-font-sans); font-size:11px; color:#555; line-height:1.55;">Geist 700 with <code style="font-family:var(--cl-font-mono); background:#f1f3f5; padding:1px 4px; border-radius:3px; font-size:10px;">font-variant-numeric: tabular-nums</code> on every count, percent, ratio, and timer. The codebase enforces this; we keep it.</div>
</body></html>
