<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Inputs</title></head>
<body>
<style>
  .field { display:block; }
  .lbl { font-size:0.68rem; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:#555; margin-bottom:6px; }
  .input { width:100%; font-family:inherit; font-size:0.92rem; padding:9px 12px; border:1px solid #dee2e6; background:white; border-radius:8px; color:#1a1a2e; outline:none; }
  .input:focus { border-color:#2d6a4f; box-shadow:0 0 0 3px rgba(45,106,79,0.18); }
  .input-error { border-color:#d63031; }
  .err { font-size:0.72rem; color:#d63031; margin-top:4px; }
  .help { font-size:0.72rem; color:#6c757d; margin-top:4px; }
  textarea.input { resize:vertical; line-height:1.55; }
</style>
<div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
  <label class="field">
    <div class="lbl">Email</div>
    <input class="input" value="byron.donalds@civiclens-demo.com" />
    <div class="help">Demo password: CivicLensDemo!2026</div>
  </label>
  <label class="field">
    <div class="lbl">Address</div>
    <input class="input input-error" value="" placeholder="123 Main St, Naples, FL" />
    <div class="err">We couldn't find this address.</div>
  </label>
</div>
<label class="field" style="margin-top:12px;">
  <div class="lbl">Post body</div>
  <textarea class="input" rows="2">Posting from Naples — town hall on flood-mitigation funding tonight at 7. Bring questions.</textarea>
</label>
</body></html>
