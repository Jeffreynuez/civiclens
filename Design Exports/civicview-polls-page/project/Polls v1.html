<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CivicView — /polls page</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="polls.css" />
  <style>
    /* Canvas-only styles — not lifted into the engineer's bundle */
    html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
    body { background: #f0eee9; font-family: 'Geist', -apple-system, sans-serif; }

    /* Inside each artboard, we mount a full PollsPage. Reset the artboard
       background so the page paints its own. The artboard is a static frame;
       we never want internal scrolling there, so polls-page can grow tall. */
    .artboard-mount {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      background: var(--cl-bg);
    }
    /* Disable sticky inside artboards — sticky breaks when the artboard
       isn't the scroll container. */
    .artboard-mount .cv-nav,
    .artboard-mount .polls-filters {
      position: static;
    }

    /* Annotation post-it bubble — tiny rationale notes pinned next to
       artboards. Pure CSS, no glyphs. */
    .rationale {
      background: #fef4a8;
      color: #5a4a2a;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 14px 16px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.45;
      max-width: 100%;
      height: 100%;
      box-sizing: border-box;
      overflow: auto;
    }
    .rationale h4 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8a6f24;
    }
    .rationale p { margin: 0 0 8px; }
    .rationale p:last-child { margin: 0; }
    .rationale strong { color: #2a2418; }
    .rationale ul { margin: 0; padding-left: 18px; }
    .rationale li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="polls-data.js"></script>
  <script type="text/babel" src="polls-glyphs.jsx"></script>
  <script type="text/babel" src="poll-card.jsx"></script>
  <script type="text/babel" src="polls-page.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useRef } = React;

    // Mount a fully-rendered PollsPage inside an artboard.
    function Mount({ children }) {
      return <div className="artboard-mount" data-screen-label={null}>{children}</div>;
    }
    function Rationale({ title, children }) {
      return (
        <div className="rationale" data-dc-skip-bg="true">
          {title && <h4>{title}</h4>}
          {children}
        </div>
      );
    }

    const PP = window.PollsPage;

    function App() {
      return (
        <DesignCanvas title="CivicView — /polls" subtitle="Hi-fi pass · responsive · variants · states">
          <DCSection
            id="responsive"
            title="1. Recommended design — responsive flow"
            subtitle="Same page, three viewport widths. Desktop = 3-col grid, tablet = 2-col, mobile = stacked.">

            <DCArtboard id="rec-desktop" label="Desktop · 1440" width={1440} height={1900}>
              <Mount><PP hero="dark" state="loaded" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="rec-tablet" label="Tablet · 820" width={820} height={2280}>
              <Mount><PP hero="dark" state="loaded" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="rec-mobile" label="Mobile · 390" width={390} height={3680}>
              <Mount><PP hero="dark" state="loaded" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="rec-rationale" label="Why this direction" width={360} height={520}>
              <Rationale title="Design rationale">
                <p><strong>Dark "grassroots" hero wins over light.</strong> The polls feed is framed as the user-engagement safety net — civic conversation that holds the room together when no rep has posted. A dark navy band asserts that identity at the top of the page (matches your Help-build overlay), then steps out of the way so the cards carry the rest.</p>
                <p><strong>Filter rows visually distinct.</strong> Kind row sits on white; AI row tints with <code>--cl-accent-soft</code>. Reads as <em>two</em> filter dimensions, not one long row of chips.</p>
                <p><strong>Kind chip refinement:</strong> rep = navy-tinted (institutional), citizen = accent-green (civic engagement), standalone = warning-soft (topic without an owner). The earlier blue/green/amber set is replaced with brand tokens — no off-brand color invention.</p>
                <p><strong>Grid:</strong> <code>auto-fill, minmax(320px, 1fr)</code> gives 3 cols at 1040px page-width, 2 at tablet, 1 at mobile, automatically. No JS breakpoints needed.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="hero-variants"
            title="2. Hero treatment — two options"
            subtitle="Both use the same eyebrow / title / subhead / stat block. Dark is the recommendation; light is here if you'd rather the page feel uniform with the Constituent Dashboard.">

            <DCArtboard id="hero-dark" label="A · Dark grassroots (recommended)" width={1440} height={1080}>
              <Mount><PP hero="dark" state="loaded" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="hero-light" label="B · Light dashboard-style" width={1440} height={1080}>
              <Mount><PP hero="light" state="loaded" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="hero-rationale" label="A vs B" width={360} height={520}>
              <Rationale title="When each works">
                <p><strong>A · Dark grassroots</strong> — the page declares itself. Pairs well with the rest of the navy chrome (navbar, avatars). Best when /polls is a destination users navigate <em>to</em>, not stumble into.</p>
                <p><strong>B · Light dashboard</strong> — quieter; sits closer to the Dashboard's accent-tinted hero card. Better when /polls is mostly visited from inside an authenticated session and shouldn't feel like a different surface.</p>
                <p>The decision is one CSS class: <code>.polls-hero.is-light</code>.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="states"
            title="3. Content states"
            subtitle="Active-filter banner, empty result set, loading skeletons.">

            <DCArtboard id="state-filtered" label="AI filter active" width={1440} height={1080}>
              <Mount><PP hero="dark" state="filtered" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="state-empty" label="Empty result set" width={1440} height={900}>
              <Mount><PP hero="dark" state="empty" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="state-loading" label="Loading skeletons" width={1440} height={1280}>
              <Mount><PP hero="dark" state="loading" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="state-rationale" label="Notes" width={360} height={520}>
              <Rationale title="State notes">
                <p><strong>Active-filter banner.</strong> Accent-tinted, sits between the sticky filter bar and the grid. One-click <em>Clear ✕</em> resets the AI dimension only — kind chips stay. The count ("showing 3 of 12") is load-bearing: it tells users their filter is doing something, even when the grid still feels full.</p>
                <p><strong>Empty.</strong> Dashed-border tile, accent-soft megaphone glyph, two-action CTA pair (Clear filters / Start a poll). Copy: "what citizens ask here is what other citizens see next" — earns the grassroots framing.</p>
                <p><strong>Loading.</strong> Six skeleton cards, shimmer animation. Same card shape as the real cards so the layout doesn't jump on hydrate.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="signed-out"
            title="4. Signed-out variant"
            subtitle="Anonymous viewers see the same feed; the Start-a-poll affordance swaps to muted 'Sign in to start a poll'.">

            <DCArtboard id="signed-out-desktop" label="Anonymous · 1440" width={1440} height={1080}>
              <Mount><PP hero="dark" state="loaded" signedIn={false} /></Mount>
            </DCArtboard>

            <DCArtboard id="signed-out-rationale" label="Notes" width={360} height={400}>
              <Rationale title="Signed-out rules">
                <p><strong>Don't gate the feed.</strong> Read access for everyone — the page works as the civic-conversation entry point even for first-time visitors.</p>
                <p><strong>Start-a-poll degrades, doesn't disappear.</strong> Muted white pill with a lock glyph + "Sign in to start a poll" preserves the spatial affordance so signed-in returners know exactly where the button is.</p>
                <p>Navbar swaps citizen identity chip → "Citizen login" pill (already in the design system Navbar).</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
