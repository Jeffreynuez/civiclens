<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CivicView — Grassroots Feed</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="polls.css" />
  <style>
    html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
    body { background: #f0eee9; font-family: 'Geist', -apple-system, sans-serif; }

    .artboard-mount {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      background: var(--cl-bg);
    }
    .artboard-mount .cv-nav2,
    .artboard-mount .polls-filters {
      position: static;
    }
    .artboard-mount .polls-fab { position: absolute; }
    .artboard-mount .cv-modal-bg { position: absolute; }

    /* Isolated single-card surface, used in the cross-feed pair section. */
    .card-iso {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--cl-bg);
      padding: 24px;
      box-sizing: border-box;
      container-type: inline-size;
      container-name: pollspage;
    }
    .card-iso__inner { max-width: 100%; }

    /* Annotation post-its */
    .rationale {
      background: #fef4a8;
      color: #5a4a2a;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 14px 16px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.45;
      max-width: 100%;
      height: 100%;
      box-sizing: border-box;
      overflow: auto;
    }
    .rationale h4 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8a6f24;
    }
    .rationale p { margin: 0 0 8px; }
    .rationale p:last-child { margin: 0; }
    .rationale strong { color: #2a2418; }
    .rationale ul { margin: 0; padding-left: 18px; }
    .rationale li { margin-bottom: 4px; }
    .rationale code {
      background: rgba(0,0,0,0.06);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
    .rationale .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: #2d6a4f;
      color: white;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="polls-data.js"></script>
  <script type="text/babel" src="polls-glyphs.jsx"></script>
  <script type="text/babel" src="polls-navbar.jsx"></script>
  <script type="text/babel" src="tab-strip.jsx"></script>
  <script type="text/babel" src="state-dropdown.jsx"></script>
  <script type="text/babel" src="comments-thread.jsx"></script>
  <script type="text/babel" src="feed-card.jsx"></script>
  <script type="text/babel" src="polls-page.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    function Mount({ children }) {
      return <div className="artboard-mount">{children}</div>;
    }
    function Rationale({ title, children }) {
      return (
        <div className="rationale" data-dc-skip-bg="true">
          {title && <h4>{title}</h4>}
          {children}
        </div>
      );
    }

    /* IsolatedCard — render a single FeedCard with no surrounding chrome.
       Used to show the two halves of a cross-feed pair side by side. */
    function IsolatedCard({ cardId, kind, isAuthor = false, isCommentsOpen = false, label }) {
      const FeedCard = window.FeedCard;
      const card = (kind === 'post'
        ? window.POSTS_SEED.find(p => p.id === cardId)
        : window.POLLS_SEED.find(p => p.id === cardId));
      if (!card) return null;
      return (
        <div className="card-iso">
          <div className="card-iso__inner">
            <FeedCard
              card={card}
              kind={kind}
              isAuthor={isAuthor}
              isCommentsOpen={isCommentsOpen}
              onToggleComments={() => {}}
              onDelete={() => {}}
            />
          </div>
        </div>
      );
    }

    const GF = window.GrassrootsFeed;

    function App() {
      return (
        <DesignCanvas title="CivicView — Grassroots Feed" subtitle="/polls + /posts · tabs · multi-select chips · cross-feed splitting · inline comments">

          {/* ═══════════ 1. TABS + NEW CHIPS ═══════════ */}
          <DCSection
            id="tabs-chips"
            title="1. Tabs + new chips"
            subtitle="TabStrip mounted between hero and chips. Chips renamed (Bill→States with dropdown, Committee→Congress). Below the tabs, content slide-fades on switch.">

            <DCArtboard id="t1-desktop" label="Desktop · 1440" width={1440} height={2200}>
              <Mount><GF tab="polls" state="loaded" signedIn={true} /></Mount>
            </DCArtboard>
            <DCArtboard id="t1-tablet" label="Tablet · 820" width={820} height={2600}>
              <Mount><GF tab="polls" state="loaded" signedIn={true} /></Mount>
            </DCArtboard>
            <DCArtboard id="t1-mobile" label="Mobile · 390" width={390} height={4400}>
              <Mount><GF tab="polls" state="loaded" signedIn={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="t1-notes" label="Why this wiring" width={360} height={620}>
              <Rationale title="Tabs + chips integration">
                <p><strong>TabStrip is the URL.</strong> <code>/polls</code> and <code>/posts</code> are the same page shell; the tab is the URL, switched via client-side push. Below the tabs, everything is wrapped in <code>TabContent</code> so the chip row + grid + bottom CTA slide-fade together (~240ms each way). The navy hero stays put — its copy and stats just swap.</p>
                <p><strong>Chip set, Polls tab:</strong> <em>All polls · States · Congress · Executive · Judicial · Standalone · From candidates</em> (<code>Soon</code>). Bill became States (with dropdown); Committee became Congress.</p>
                <p><strong>Chips are additive.</strong> Click any two — e.g. Standalone + Congress — and the grid renders the union. "All polls" is the deactivator: clicking it clears every other chip and shows everything.</p>
                <p><strong>Standalone tier preserved</strong> as visually distinct: dashed border + warning-yellow dot prefix. Reads as the "aunt" relative to branch siblings.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          {/* ═══════════ 2. STATES DROPDOWN ═══════════ */}
          <DCSection
            id="states-dd"
            title="2. States dropdown open"
            subtitle="Scrollable 51-entry dropdown with TOP + BOTTOM fade gradients. The artboard pre-scrolls the list so both gradients are visible simultaneously.">

            <DCArtboard id="dd-open" label="States dropdown — both fades visible" width={1440} height={900}>
              <Mount>
                <GF tab="polls" state="loaded" signedIn={true}
                    prefill={{ statesOpen: true, statesScrollOffset: 240 }} />
              </Mount>
            </DCArtboard>

            <DCArtboard id="dd-selected" label="State chosen — chip relabels to 'States · FL'" width={1440} height={900}>
              <Mount>
                <GF tab="polls" state="loaded" signedIn={true}
                    prefill={{ selectedState: 'FL' }} />
              </Mount>
            </DCArtboard>

            <DCArtboard id="dd-notes" label="StateDropdown notes" width={360} height={520}>
              <Rationale title="Dropdown rules">
                <p><strong>Top fade.</strong> Hidden until the user scrolls down — the list reads as "starts at the top." Once <code>scrollTop &gt; 6</code>, the top fade appears.</p>
                <p><strong>Bottom fade.</strong> Always visible until the list scrolls to its end. When <code>scrollHeight - scrollTop - clientHeight &lt; 6</code>, the bottom fade fades out.</p>
                <p><strong>Selection.</strong> Single-select. Clicking a row sets the State and auto-activates the States chip. Chip label flips to <code>States · FL</code> (or whichever abbreviation).</p>
                <p><strong>Scope.</strong> Filter applies to reps + candidates whose page is in the chosen state, PLUS standalone polls whose author has that state on their profile.</p>
                <p><strong>Mobile</strong> renders the dropdown as a fixed bottom-anchored sheet that doesn't overlap the chips above.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          {/* ═══════════ 3. MULTI-CHIP SELECTION ═══════════ */}
          <DCSection
            id="multi-chip"
            title="3. Multi-chip selection active"
            subtitle="Three chips selected simultaneously: States · FL + Congress + Standalone. Grid renders the union; counts update live.">

            <DCArtboard id="multi-desktop" label="Three chips active · Desktop 1440" width={1440} height={1280}>
              <Mount>
                <GF tab="polls" state="loaded" signedIn={true}
                    prefill={{ branches: ['standalone', 'congress'], selectedState: 'FL' }} />
              </Mount>
            </DCArtboard>

            <DCArtboard id="multi-mobile" label="Three chips active · Mobile 390" width={390} height={2400}>
              <Mount>
                <GF tab="polls" state="loaded" signedIn={true}
                    prefill={{ branches: ['standalone', 'congress'], selectedState: 'FL' }} />
              </Mount>
            </DCArtboard>

            <DCArtboard id="multi-notes" label="Multi-select behavior" width={360} height={520}>
              <Rationale title="Additive chip rules">
                <p><strong>Click to toggle.</strong> Each non-All chip is independent. Toggling one ON adds its set to the union; toggling OFF removes it.</p>
                <p><strong>"All polls" is the deactivator.</strong> Clicking it clears every other chip and shows the full feed. Clicking "All polls" again has no effect (already all).</p>
                <p><strong>Counts update live.</strong> Each chip's count reflects how many cards match it against the FULL set, not the currently-filtered set. (Otherwise users couldn't tell what a chip would add.)</p>
                <p><strong>Active visual:</strong> green-filled for normal chips; dark-filled for the Standalone tier (preserves its dashed-border + dot identity even when active).</p>
                <p><strong>State + branches stack.</strong> Selected state narrows the union to that state. The grid count then reflects: <em>(branches union) ∩ state</em>.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          {/* ═══════════ 4. COMMENTS THREAD — ACCORDION ═══════════ */}
          <DCSection
            id="comments"
            title="4. Comments thread expanded — accordion"
            subtitle="Click Comments(N) on a card to expand its thread inline. Opening another card's thread instantly collapses the previously-open one.">

            <DCArtboard id="thread-A" label="Card A open (Byron Donalds · p1)" width={1440} height={2400}>
              <Mount>
                <GF tab="polls" state="loaded" signedIn={true}
                    prefill={{ openCommentId: 'p1' }} />
              </Mount>
            </DCArtboard>

            <DCArtboard id="thread-B" label="Card B open (Andre Boyle · p8) — A auto-closed" width={1440} height={2400}>
              <Mount>
                <GF tab="polls" state="loaded" signedIn={true}
                    prefill={{ openCommentId: 'p8' }} />
              </Mount>
            </DCArtboard>

            <DCArtboard id="thread-notes" label="Accordion + thread rules" width={360} height={700}>
              <Rationale title="One thread open at a time">
                <p><strong>Accordion.</strong> Only one card's thread can be open at any time. Click <em>Comments(N)</em> on Card B and Card A's thread closes instantly. Smooth height transition on both ends.</p>
                <p><strong>Lazy load.</strong> No comment data is fetched until the thread is expanded. Cap displayed at 5 newest; <em>View all (N)</em> link expands the rest in place, or deep-links to the parent rep page for rep/candidate cards.</p>
                <p><strong>Mirrors the rep page exactly:</strong></p>
                <ul>
                  <li>Identity picker (multi-identity → choose which "you" comments as)</li>
                  <li>Composer textarea + Post button</li>
                  <li>Sort dropdown (Latest / Top / Oldest)</li>
                  <li>5 AI tone chips (Positive · Critical · Funny · Supportive · Skeptical)</li>
                  <li>Semantic filter input + Apply</li>
                  <li>Comment items: Unverified pill, district, like/dislike, Delete (own) or Report + Reply</li>
                </ul>
                <p><strong>Back-port flag:</strong> the accordion behavior here is cleaner than the rep-page version (which lets multiple threads open). Recommended to back-port.</p>
                <p><strong>Card expansion:</strong> when a thread opens, the card spans the full grid row (<code>grid-column: 1 / -1</code>) so the thread isn't squeezed.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          {/* ═══════════ 5. POSTS TAB ═══════════ */}
          <DCSection
            id="posts"
            title="5. Posts tab"
            subtitle="Full Posts feed, signed-in rep with 'Start a post' CTA, signed-out variant, '+ poll attached' badge on a Posts card.">

            <DCArtboard id="posts-default" label="Posts · signed-in citizen" width={1440} height={2200}>
              <Mount><GF tab="posts" state="loaded" signedIn={true} canPost={false} /></Mount>
            </DCArtboard>

            <DCArtboard id="posts-rep" label="Posts · signed-in rep — 'Start a post' visible" width={1440} height={2200}>
              <Mount><GF tab="posts" state="loaded" signedIn={true} canPost={true} /></Mount>
            </DCArtboard>

            <DCArtboard id="posts-signedout" label="Posts · signed-out (no Start CTA)" width={1440} height={2200}>
              <Mount><GF tab="posts" state="loaded" signedIn={false} canPost={false} /></Mount>
            </DCArtboard>

            <DCArtboard id="posts-mobile" label="Posts · Mobile 390" width={390} height={4400}>
              <Mount><GF tab="posts" state="loaded" signedIn={true} canPost={false} /></Mount>
            </DCArtboard>

            <DCArtboard id="posts-notes" label="Posts tab rules" width={360} height={620}>
              <Rationale title="What's different on /posts">
                <p><strong>Authorship gated.</strong> Posts come from verified reps + candidates only. Citizens are read-only — no "Start a poll" analog. <em>Start a post</em> CTA renders only when a verified rep or candidate is signed in (top-right of chip row + mobile FAB).</p>
                <p><strong>Standalone chip dropped.</strong> Citizens can't author posts, so the chip would always be empty.</p>
                <p><strong>Sort.</strong> Engagement score = <code>comments + likes + dislikes + votes</code>, descending. Tiebreaker = recency.</p>
                <p><strong>Card body:</strong> post text (collapse to preview at &gt;400 chars with an "Expand" pill), <em>Summarize</em> button when AI summary is available, and a "+ poll attached" pill if the post has an attached poll (visible on multiple cards here — Byron Donalds, Nancy Pelosi, SCOTUS).</p>
                <p><strong>Hero copy</strong> swaps to "Every post from verified reps + candidates…" with stats <em>Total posts · Posts this week · Reps + candidates active</em>.</p>
                <p><strong>Polls-only chrome hidden:</strong> top-right "Start a poll" + mobile FAB do NOT render on /posts (unless signed-in rep/candidate, in which case they're replaced with "Start a post").</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          {/* ═══════════ 6. CROSS-FEED PAIR ═══════════ */}
          <DCSection
            id="cross-feed"
            title="6. Cross-feed pair"
            subtitle="A single authored unit (Byron Donalds post + attached poll) appears in BOTH feeds as separate cards. Each carries a dashed-accent badge linking back to the parent page.">

            <DCArtboard id="pair-poll" label="Polls feed card — 'From a post' badge" width={500} height={720}>
              <IsolatedCard cardId="p1" kind="poll" />
            </DCArtboard>

            <DCArtboard id="pair-post" label="Posts feed card — '+ poll attached' badge" width={500} height={720}>
              <IsolatedCard cardId="post-bd-1" kind="post" />
            </DCArtboard>

            <DCArtboard id="pair-notes" label="Cross-feed splitting rules" width={360} height={680}>
              <Rationale title="Same unit, two cards">
                <p><strong>One author, two records.</strong> When a rep or candidate publishes a post with an attached poll, the backend creates two linked records. They appear once each in the two feeds — never duplicated within a single feed.</p>
                <p><strong>Polls tab</strong>: PollBlock with options, percentages, "your vote" markers. Above the question, the dashed-accent pill reads <em>From a post → Open page</em>. Click goes to the parent rep page where the full post body lives.</p>
                <p><strong>Posts tab</strong>: post body, Summarize button, Expand pill. Inside the body, a matching dashed-accent pill reads <em>+ poll attached → Open page</em>. Click goes to the same parent rep page where the poll can be voted.</p>
                <p><strong>Why two cards, not one.</strong> Users browsing one feed surface don't miss content authored as a combined unit. A user filtering polls about taxes still finds the SALT-cap poll even though the author published it as a post. A user browsing posts still sees the SALT-cap update with a clear path to the vote.</p>
                <p><strong>Style choice.</strong> Both badges use dashed borders + accent green — they read as "soft" pointers (this card has a sibling), not as a hard CTA. The arrow + "Open page" copy makes the destination explicit.</p>
              </Rationale>
            </DCArtboard>
          </DCSection>

          {/* ═══════════ 7. SUPPLEMENTARY STATES ═══════════ */}
          <DCSection
            id="states"
            title="7. Other states"
            subtitle="Content states preserved from the prior pass: AI-filter zero match, full-empty per tab, loading skeletons, delete-confirm modal.">

            <DCArtboard id="s-ai-zero" label="AI filter zero-match (in-grid)" width={1440} height={900}>
              <Mount><GF tab="polls" state="empty-ai" signedIn={true} /></Mount>
            </DCArtboard>
            <DCArtboard id="s-polls-empty" label="Polls — no matches at all" width={1440} height={900}>
              <Mount><GF tab="polls" state="empty" signedIn={true} /></Mount>
            </DCArtboard>
            <DCArtboard id="s-posts-empty" label="Posts — no matches at all" width={1440} height={900}>
              <Mount><GF tab="posts" state="empty" signedIn={true} /></Mount>
            </DCArtboard>
            <DCArtboard id="s-loading" label="Loading skeletons" width={1440} height={1280}>
              <Mount><GF tab="polls" state="loading" signedIn={true} /></Mount>
            </DCArtboard>
            <DCArtboard id="s-delete-modal" label="Delete-confirm modal" width={1440} height={1100}>
              <Mount>
                <GF tab="polls" state="loaded" signedIn={true}
                    prefill={{ branches: ['standalone'], deleteModalFor: 'p8' }} />
              </Mount>
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
