# Dependabot configuration — security + version updates.
#
# Per docs/SECURITY.md §2: Dependabot opens PRs when a dependency has a known
# CVE (security updates) or when a non-major version bump is available (version
# updates). PRs are routed to the default reviewer and rate-limited so the
# repo isn't flooded.
#
# Free on public repos; free on private repos for security updates only.
version: 2
updates:
  # Python backend — FastAPI, SQLAlchemy, Pydantic, etc.
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(backend)"

  # Next.js frontend — React, Next, Tailwind, etc.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"

  # GitHub Actions workflow files (none today, but having Dependabot ready
  # means we'll auto-get update PRs the moment we add an actions/* step).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
